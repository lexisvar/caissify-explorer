services:
  # ── Development shell ──────────────────────────────────────────────────────
  # Provides a container with Rust + all native build deps (clang, liburing).
  # Source is bind-mounted; cargo registry/git/target are persisted in volumes.
  #
  # Usage:
  #   docker compose run --rm dev cargo check
  #   docker compose run --rm dev cargo build --release
  #   docker compose run --rm dev cargo test
  #   docker compose run --rm dev cargo clippy
  #   docker compose run --rm dev cargo fmt
  #
  dev:
    build:
      context: .
      target: builder          # reuse the builder stage — already has rustc + deps
    image: caissify-explorer-dev:latest
    profiles: [dev]
    working_dir: /app
    volumes:
      - .:/app                              # live source mount
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - dev-target:/app/target              # persistent build cache
    environment:
      JEMALLOC_SYS_WITH_MALLOC_CONF: "abort_conf:true,background_thread:true,metadata_thp:auto,dirty_decay_ms:30000,muzzy_decay_ms:30000"
      RUST_BACKTRACE: "1"
    entrypoint: [""]                        # override ENTRYPOINT so we can run arbitrary commands
    command: ["cargo", "check"]

  explorer:
    build: .
    image: caissify-explorer:latest
    restart: "no"
    ports:
      - "9002:9002"
    volumes:
      - explorer-db:/data
    environment:
      EXPLORER_LOG: "info"
      JEMALLOC_SYS_WITH_MALLOC_CONF: "abort_conf:true,background_thread:true,metadata_thp:auto,dirty_decay_ms:30000,muzzy_decode_ms:30000"
      # Optional: EXPLORER_BEARER=<lichess-api-token>
    command:
      - --bind
      - "0.0.0.0:9002"
      - --db
      - /data
      - --cors
      - --db-cache
      - "536870912"  # 512 MB (reduce for local dev; default is 4 GB)

  # ── Caissify / OMOTB importer ──────────────────────────────────────────────
  # Usage:
  #   PGN_URL="https://m224.sync.com/u/..." \
  #   PGN_COOKIE="sync_auth=...; signature=..." \
  #   docker compose --profile import up importer
  #
  # The service downloads the PGN (skipped if /pgn/omotb.pgn already exists)
  # then streams it game-by-game to PUT /import/caissify on the explorer.
  importer:
    image: caissify-explorer:latest
    profiles: [import]
    depends_on:
      - explorer
    volumes:
      - pgn-data:/pgn
      - ./import-entrypoint.sh:/import-entrypoint.sh:ro
    environment:
      # Required: pass these when running the service
      PGN_URL: "${PGN_URL}"
      PGN_COOKIE: "${PGN_COOKIE}"
      # Optional tuning
      BATCH_SIZE: "${BATCH_SIZE:-200}"
      EXPLORER_ENDPOINT: "http://explorer:9002"
    entrypoint: ["/bin/sh", "/import-entrypoint.sh"]
    restart: "no"

volumes:
  explorer-db:
    driver: local
  pgn-data:
    driver: local
  cargo-registry:
    driver: local
  cargo-git:
    driver: local
  dev-target:
    driver: local
